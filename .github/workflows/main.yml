name: linux project

on:
  workflow_dispatch:
    inputs:
      authcode:
        description: "Chrome Remote Desktop AUTH code"
        required: true
      pin:
        description: "6-digit PIN"
        required: true

jobs:
  run-crd:
    runs-on: ubuntu-latest

    steps:
    - name: Install XFCE + Chrome Remote Desktop
      run: |
        set -e

        echo "Updating system..."
        sudo apt-get update

        echo "Installing XFCE..."
        sudo apt-get install -y xfce4 xfce4-terminal xfce4-goodies dbus-x11 wget gdebi-core

        echo "Downloading Chrome Remote Desktop..."
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        sudo gdebi -n chrome-remote-desktop_current_amd64.deb

        echo "Setting XFCE session..."
        echo "exec startxfce4" > ~/.chrome-remote-desktop-session
        chmod +x ~/.chrome-remote-desktop-session

    - name: Start Chrome Remote Desktop
      run: |
        set -e

        echo "Starting CRD host..."

        export DISPLAY=:0

        sudo /opt/google/chrome-remote-desktop/start-host \
          --code="${{ github.event.inputs.authcode }}" \
          --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
          --name=$(hostname) \
          --pin="${{ github.event.inputs.pin }}"

    - name: Keep session alive
      run: |
        for ((i=360;i>0;i--)); do
          echo "Keep alive: $i minutes left"
          sleep 60
        done
